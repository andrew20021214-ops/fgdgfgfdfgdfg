<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #fff; color: #000; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { text-align: center; }
        h1 { font-size: 24px; font-weight: 500; margin: 0; padding: 0 20px 0 0; border-right: 1px solid rgba(0,0,0,.3); display: inline-block; vertical-align: top; line-height: 49px; }
        .message { display: inline-block; text-align: left; line-height: 49px; height: 49px; vertical-align: middle; padding: 0 0 0 20px; }
        h2 { font-size: 14px; font-weight: 400; margin: 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <div class="message">
            <h2>This page could not be found.</h2>
        </div>
    </div>
</body>
</html>
